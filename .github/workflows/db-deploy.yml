name: Deploy DB Migrations

on:
  push:
    branches: [main]
    paths:
      - 'project-r/supabase/migrations/**'
      - 'project-r/supabase/bucket-policies.sql'
  workflow_dispatch:

jobs:
  deploy-migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Create .supabase config
        working-directory: project-r
        run: |
          mkdir -p .supabase
          cat > .supabase/config.toml << EOF
          [project]
          supabase_url = "https://${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co"
          supabase_key = "${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}"
          project_id = "${{ secrets.SUPABASE_PROJECT_ID }}"
          EOF
          cat .supabase/config.toml

      - name: Push migrations to remote
        working-directory: project-r
        run: supabase db push --dry-run
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        continue-on-error: true

      - name: Apply migrations to remote
        working-directory: project-r
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify migrations applied
        working-directory: project-r
        run: supabase status
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
