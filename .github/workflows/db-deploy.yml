name: Deploy DB Migrations

on:
  push:
    branches: [main]
    paths:
      - 'project-r/supabase/migrations/**'
      - 'project-r/supabase/bucket-policies.sql'
  workflow_dispatch:

jobs:
  deploy-migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations to remote
        working-directory: project-r
        run: bash scripts/push-migrations.sh
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
