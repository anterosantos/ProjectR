name: Deploy DB Migrations

on:
  push:
    branches: [main]
    paths:
      - 'project-r/supabase/migrations/**'
      - 'project-r/supabase/bucket-policies.sql'
  workflow_dispatch:

jobs:
  deploy-migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Supabase project
        working-directory: project-r
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --no-prompt || true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations (dry-run)
        working-directory: project-r
        run: supabase db push --dry-run
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        continue-on-error: true

      - name: Apply migrations to remote
        working-directory: project-r
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify migrations applied
        working-directory: project-r
        run: supabase db pull
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
