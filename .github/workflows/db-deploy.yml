name: Deploy DB Migrations

on:
  push:
    branches: [main]
    paths:
      - 'sparta/supabase/migrations/**'
      - 'sparta/supabase/bucket-policies.sql'
  workflow_dispatch:

jobs:
  deploy-migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply migrations to remote
        working-directory: sparta
        run: bash scripts/push-migrations.sh
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
