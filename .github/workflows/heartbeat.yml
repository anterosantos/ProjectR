name: Heartbeat

on:
  schedule:
    # Every 6 days at 12:00 UTC — keeps Supabase free tier alive (NFR49)
    - cron: '0 12 */6 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Run Heartbeat Query
        id: heartbeat
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "❌ SUPABASE_DB_URL secret is not configured"
            exit 1
          fi
          psql "$DATABASE_URL" -c "SELECT NOW();"
          echo "✅ Heartbeat OK at $(date -u)"

      - name: Check Previous Failures
        id: check-failures
        if: failure()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Counts only previously COMPLETED runs, not the current in-progress run.
          # >= 1 previous failure + current failure = 2 total (2-strike threshold).
          FAILURES=$(gh run list \
            --workflow=heartbeat.yml \
            --status failure \
            --limit 10 \
            --json createdAt \
            --jq '[.[] | select(.createdAt | fromdateiso8601 > (now - 12 * 24 * 3600))] | length' \
            2>/dev/null || echo 0)
          echo "failures=${FAILURES:-0}" >> "$GITHUB_OUTPUT"
          if [ "${FAILURES:-0}" -ge 1 ]; then
            echo "should_alert=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_alert=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Alert Issue
        if: failure() && steps.check-failures.outputs.should_alert == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "heartbeat-alert" \
            --color "FF0000" \
            --description "Supabase heartbeat failure alert" \
            2>/dev/null || true
          BODY="## Database Heartbeat Alert

          The Supabase database heartbeat has failed consecutively (2+ times in the last 12 days).

          **Timestamp:** $(date -u)
          **Run:** ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          **Run Number:** #${GITHUB_RUN_NUMBER}

          Please check Supabase database connectivity and verify the \`SUPABASE_DB_URL\` secret is valid."
          gh issue create \
            --title "[ALERT] Heartbeat: Database Unreachable (Run #${GITHUB_RUN_NUMBER})" \
            --label "heartbeat-alert" \
            --body "$BODY"
        continue-on-error: true
