name: CI

on:
  pull_request:
  push:
    branches: [main]

defaults:
  run:
    working-directory: project-r

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: project-r/package-lock.json
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: project-r/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: project-r/package-lock.json
      - run: npm ci
      - name: Install Supabase CLI
        run: npm install -g supabase
      - name: Start local Supabase stack
        run: supabase start -x edge-runtime,vector,imgproxy,logflare,studio,mailpit
        working-directory: project-r
      - name: Apply migrations
        run: supabase db reset --no-seed
        working-directory: project-r
      - name: Export Supabase credentials for tests
        working-directory: project-r
        run: |
          # URL is fixed per config.toml [api] port = 54321
          echo "NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:54321" >> $GITHUB_ENV
          # Strip ANSI codes then extract JWT tokens by their invariant eyJ prefix
          # (base64url of {"...}) — robust against format/color changes across CLI versions
          STATUS=$(supabase status 2>&1 | sed 's/\x1b\[[0-9;]*m//g')
          ANON_KEY=$(echo "$STATUS" | grep -i 'anon' | grep -oE 'eyJ[A-Za-z0-9._-]+' | head -1)
          SERVICE_KEY=$(echo "$STATUS" | grep -i 'service' | grep -oE 'eyJ[A-Za-z0-9._-]+' | head -1)
          if [ -z "$ANON_KEY" ] || [ -z "$SERVICE_KEY" ]; then
            echo "ERROR: Failed to extract Supabase credentials. Raw status output:"
            echo "$STATUS"
            exit 1
          fi
          echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${ANON_KEY}" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=${SERVICE_KEY}" >> $GITHUB_ENV
          echo "Credentials extracted (anon: ${ANON_KEY:0:20}..., service: ${SERVICE_KEY:0:20}...)"
      - run: npm run test:coverage
      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup
        working-directory: project-r

  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: project-r/package-lock.json
      - name: Debug env vars
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL length: ${#NEXT_PUBLIC_SUPABASE_URL}"
          echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY length: ${#NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}"
        working-directory: project-r
      - run: npm ci
      - run: npm run build
      - run: npm run check-bundle-size

  lighthouse-ci:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: project-r/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npx lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  migration-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Supabase CLI
        run: npm install -g supabase
      - name: Start local Supabase stack
        run: supabase start -x edge-runtime,vector,imgproxy,logflare,studio,mailpit
        working-directory: project-r
      - name: Validate migrations
        run: supabase db reset --no-seed
        working-directory: project-r
      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup
        working-directory: project-r
