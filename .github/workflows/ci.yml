name: CI

on:
  pull_request:
  push:
    branches: [main]

defaults:
  run:
    working-directory: project-r

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: project-r/package-lock.json
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: project-r/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    env:
      CI: 'true'
      # Integration tests run against a local Supabase stack (same pattern as migration-validate).
      # This avoids a race with db-deploy.yml and ensures tests always see the current migrations.
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      # Well-known local Supabase default keys (JWT secret: super-secret-jwt-token-with-at-least-32-characters-long)
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRFA0NiK7W9osuKFnAs6W9NtlDjDFKoEgKYPWm8nPbQ
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hj04zWl196z2-SB38
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: project-r/package-lock.json
      - run: npm ci
      - name: Install Supabase CLI
        run: npm install -g supabase
      - name: Start local Supabase stack
        run: supabase start -x edge-runtime,vector,imgproxy,logflare,studio,mailpit
        working-directory: project-r
      - name: Apply migrations
        run: supabase db reset --no-seed
        working-directory: project-r
      - run: npm run test:coverage
      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup
        working-directory: project-r

  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: project-r/package-lock.json
      - name: Debug env vars
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL length: ${#NEXT_PUBLIC_SUPABASE_URL}"
          echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY length: ${#NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}"
        working-directory: project-r
      - run: npm ci
      - run: npm run build
      - run: npm run check-bundle-size

  lighthouse-ci:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: project-r/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npx lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  migration-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Supabase CLI
        run: npm install -g supabase
      - name: Start local Supabase stack
        run: supabase start -x edge-runtime,vector,imgproxy,logflare,studio,mailpit
        working-directory: project-r
      - name: Validate migrations
        run: supabase db reset --no-seed
        working-directory: project-r
      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup
        working-directory: project-r
