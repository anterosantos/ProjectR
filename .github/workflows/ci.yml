name: CI

on:
  pull_request:
  push:
    branches: [main]

defaults:
  run:
    working-directory: sparta

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: sparta/package-lock.json
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: sparta/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: sparta/package-lock.json
      - run: npm ci
      - name: Install Supabase CLI
        run: npm install -g supabase
      - name: Start local Supabase stack
        run: supabase start -x edge-runtime,vector,imgproxy,logflare,studio,mailpit
        working-directory: sparta
      - name: Apply migrations
        run: supabase db reset --no-seed
        working-directory: sparta
      - name: Export Supabase credentials for tests
        working-directory: sparta
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:54321" >> $GITHUB_ENV
          # Read the JWT secret GoTrue is actually using (project_id = "sparta" → container name)
          JWT_SECRET=$(docker exec supabase_auth_sparta printenv GOTRUE_JWT_SECRET 2>/dev/null || true)
          if [ -z "$JWT_SECRET" ]; then
            echo "FATAL: could not read GOTRUE_JWT_SECRET from container"
            docker ps --format "table {{.Names}}" | grep supabase || true
            exit 1
          fi
          echo "JWT_SECRET length: ${#JWT_SECRET}"
          # Generate anon + service_role JWTs signed with the actual secret
          cat > /tmp/gen-keys.mjs << 'NODEOF'
          import { createHmac } from 'crypto';
          import { appendFileSync } from 'fs';
          const secret = process.argv[2];
          const b64 = (obj) => Buffer.from(JSON.stringify(obj)).toString('base64url');
          const sign = (payload) => {
            const h = b64({ alg: 'HS256', typ: 'JWT' });
            const p = b64(payload);
            const s = createHmac('sha256', secret).update(`${h}.${p}`).digest('base64url');
            return `${h}.${p}.${s}`;
          };
          const anon = sign({ iss: 'supabase-demo', role: 'anon', exp: 1983812996 });
          const svc  = sign({ iss: 'supabase-demo', role: 'service_role', exp: 1983812996 });
          appendFileSync(process.env.GITHUB_ENV, `NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${anon}\n`);
          appendFileSync(process.env.GITHUB_ENV, `SUPABASE_SERVICE_ROLE_KEY=${svc}\n`);
          console.log('anon:', anon.slice(0, 30) + '...');
          console.log('service:', svc.slice(0, 30) + '...');
          NODEOF
          node /tmp/gen-keys.mjs "$JWT_SECRET"
      - run: npm run test:coverage
      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup
        working-directory: sparta

  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: sparta/package-lock.json
      - name: Debug env vars
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL length: ${#NEXT_PUBLIC_SUPABASE_URL}"
          echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY length: ${#NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}"
        working-directory: sparta
      - run: npm ci
      - run: npm run build
      - run: npm run check-bundle-size

  lighthouse-ci:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: sparta/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npx lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  migration-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Supabase CLI
        run: npm install -g supabase
      - name: Start local Supabase stack
        run: supabase start -x edge-runtime,vector,imgproxy,logflare,studio,mailpit
        working-directory: sparta
      - name: Validate migrations
        run: supabase db reset --no-seed
        working-directory: sparta
      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup
        working-directory: sparta
