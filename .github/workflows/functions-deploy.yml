name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'project-r/supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Link project
        working-directory: project-r
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Deploy Edge Functions
        working-directory: project-r
        run: |
          supabase functions deploy auth-hook --no-verify-jwt
          supabase functions deploy anonymize-player-photos
          supabase functions deploy consent-validate
          supabase functions deploy send-parental-consent
          supabase functions deploy staff-alert-consent
          supabase functions deploy validate-subject-token
