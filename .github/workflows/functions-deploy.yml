name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'project-r/supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Deploy Edge Functions
        working-directory: project-r
        run: |
          supabase functions deploy auth-hook \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
            --no-verify-jwt
          supabase functions deploy anonymize-player-photos \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy consent-validate \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy send-parental-consent \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy staff-alert-consent \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy validate-subject-token \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
