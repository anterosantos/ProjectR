<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Project R · Perfil de Jogador</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  body { font-family: "Inter Tight", system-ui, sans-serif; }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="profile-shared.jsx"></script>
<script type="text/babel" src="profile-mobile-a.jsx"></script>
<script type="text/babel" src="profile-mobile-b.jsx"></script>
<script type="text/babel" src="profile-desktop.jsx"></script>

<script type="text/babel">
const TWEAKS = /*EDITMODE-BEGIN*/{
  "dark": true,
  "mode": "match",
  "persona": "jose"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAKS);
  const T = t.dark ? PR_TOKENS_DARK : PR_TOKENS_LIGHT;

  return (
    <React.Fragment>
      <DesignCanvas
        title="Project R · Perfil de Jogador"
        subtitle="Mockups exploratórios — Step 9 do workflow UX"
      >
        <DCSection
          id="overview"
          title="Visão geral"
          subtitle="Tomás Silva (#10, Sub-17) — perfil unificado em 3 contextos. Tweaks controlam tema, dia-de-jogo vs treino, e persona."
        >
          <DCArtboard id="m-a" label="Móvel · A — Dossier editorial" width={390} height={844}>
            <ProfileMobileA T={T} persona={t.persona} mode={t.mode} />
          </DCArtboard>
          <DCArtboard id="m-b" label="Móvel · B — Performance cockpit" width={390} height={844}>
            <ProfileMobileB T={T} persona={t.persona} mode={t.mode} />
          </DCArtboard>
        </DCSection>

        <DCSection
          id="desktop"
          title="Desktop · Analyst Dashboard"
          subtitle="Mesmo jogador, vista 1440px — para Ana (analista) e exportação PDF."
        >
          <DCArtboard id="d-1" label="Desktop · 1440px" width={1440} height={1900}>
            <ProfileDesktop T={T} persona={t.persona} mode={t.mode} />
          </DCArtboard>
        </DCSection>

        <DCSection
          id="flows"
          title="Fluxos de apoio"
          subtitle="Pontos de entrada e saída do perfil — onde o José chega ao Tomás, e o que faz a partir daí."
        >
          <DCArtboard id="f-1" label="Entrada · Plantel filtrado" width={390} height={844}>
            <RosterEntry T={T} mode={t.mode} />
          </DCArtboard>
          <DCArtboard id="f-2" label="Saída · Decisão de convocatória" width={390} height={844}>
            <DecisionSheet T={T} mode={t.mode} />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Tema" />
        <TweakToggle label="Modo escuro" value={t.dark}
                     onChange={(v) => setTweak('dark', v)} />

        <TweakSection label="Contexto" />
        <TweakRadio label="Dia" value={t.mode}
                    options={[
                      { value: 'match', label: 'Jogo' },
                      { value: 'training', label: 'Treino' },
                    ]}
                    onChange={(v) => setTweak('mode', v)} />

        <TweakSection label="Persona" />
        <TweakSelect label="Quem está a ver" value={t.persona}
                     options={[
                       { value: 'jose', label: 'José · Treinador' },
                       { value: 'ana', label: 'Ana · Analista' },
                       { value: 'tomas', label: 'Tomás · Atleta' },
                     ]}
                     onChange={(v) => setTweak('persona', v)} />
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script type="text/babel" src="profile-flows.jsx"></script>
</body>
</html>
